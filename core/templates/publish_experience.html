{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">


<div class="col-md-8">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-center mb-4">

                Publish Experience

            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Company Name

                    </label>

                    <input
                        type="text"
                        name="company_name"
                        class="form-control"
                        placeholder="Enter Company Name">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Role

                    </label>

                    <input
                        type="text"
                        name="role"
                        list="roles"
                        class="form-control"
                        placeholder="Select Role">

                    <datalist id="roles">

                        <option value="SDE">
                        <option value="Software Engineer">
                        <option value="Associate Software Engineer">
                        <option value="Full Stack Developer">
                        <option value="Backend Developer">
                        <option value="Frontend Developer">
                        <option value="Python Developer">
                        <option value="Data Analyst">
                        <option value="Business Analyst">
                        <option value="Data Scientist">
                        <option value="ML Engineer">
                        <option value="Cloud Engineer">
                        <option value="DevOps Engineer">
                        <option value="QA Engineer">

                    </datalist>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Round Type

                    </label>

                    <select
                        name="round_type"
                        class="form-select">

                        <option>OA</option>
                        <option>GD</option>
                        <option>Technical</option>
                        <option>HR</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Focus Subject

                    </label>

                    <input
                        type="text"
                        name="focus_subject"
                        list="subjects"
                        class="form-control"
                        placeholder="Select Subject">

                    <datalist id="subjects">

                        <option value="DSA">
                        <option value="SQL">
                        <option value="DBMS">
                        <option value="OOP">
                        <option value="OS">
                        <option value="CN">
                        <option value="Python">
                        <option value="Java">
                        <option value="Aptitude">
                        <option value="Machine Learning">
                        <option value="Power BI">
                        <option value="Excel">

                    </datalist>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Experience

                    </label>

                    <textarea
                        name="experience"
                        rows="8"
                        class="form-control"
                        placeholder="Write your interview experience here..."></textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-success w-100">

                    Publish Experience

                </button>

            </form>

        </div>

    </div>

</div>


</div>

{% endblock %}
