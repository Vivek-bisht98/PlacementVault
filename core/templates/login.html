{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-center mb-4">

                Login

            </h2>

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Username

                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter Username">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Password

                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter Password">

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100">

                    Login

                </button>

            </form>

            <hr>

            <p class="text-center">

                New User?

                <a href="/register/">

                    Register Here

                </a>

            </p>

        </div>

    </div>

</div>


</div>

{% endblock %}
